<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI驱动贪吃蛇小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 15px;
        }
        .info-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 18px;
            font-weight: bold;
            color: #444;
        }
        #gameCanvas {
            border: 3px solid #333;
            border-radius: 8px;
            background: #f8f9fa;
        }
        .control-panel {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }
        #startBtn {
            background: #28a745;
            color: white;
        }
        #startBtn:hover {
            background: #218838;
        }
        #pauseBtn {
            background: #ffc107;
            color: #212529;
        }
        #pauseBtn:hover {
            background: #e0a800;
        }
        #resetBtn {
            background: #dc3545;
            color: white;
        }
        #resetBtn:hover {
            background: #c82333;
        }
        .ai-panel {
            margin-top: 20px;
            padding: 15px;
            background: #e9ecef;
            border-radius: 8px;
        }
        #aiInput {
            width: 100%;
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 14px;
        }
        #aiBtn {
            background: #6f42c1;
            color: white;
            width: 100%;
        }
        #aiBtn:hover {
            background: #5a32a3;
        }
        #aiLog {
            margin-top: 10px;
            padding: 10px;
            background: white;
            border-radius: 5px;
            font-size: 13px;
            color: #495057;
            max-height: 80px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐍 AI驱动贪吃蛇小游戏</h1>
        <div class="info-bar">
            <div>得分：<span id="score">0</span></div>
            <div>最高分：<span id="highScore">0</span></div>
            <div>速度：<span id="speed">中等</span></div>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        
        <div class="control-panel">
            <button id="startBtn" onclick="startGame()">开始游戏</button>
            <button id="pauseBtn" onclick="togglePause()">暂停/继续</button>
            <button id="resetBtn" onclick="resetGame()">重置游戏</button>
        </div>

        <!-- AI交互面板（核心加分项） -->
        <div class="ai-panel">
            <h3>🤖 AI指令控制台</h3>
            <input type="text" id="aiInput" placeholder="输入指令（如：加快速度、增加难度、减速）">
            <button id="aiBtn" onclick="processAICommand()">发送指令</button>
            <div id="aiLog">AI系统就绪，等待指令...</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const speedEl = document.getElementById('speed');
        const aiLogEl = document.getElementById('aiLog');

        // 游戏核心配置
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        let snake = [{x: 10, y: 10}];
        let dx = 1, dy = 0;
        let food = {};
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameSpeed = 150; // 基础速度（毫秒）
        let gameLoop = null;
        let isRunning = false;
        let isPaused = false;

        // 初始化最高分
        highScoreEl.textContent = highScore;

        // 生成食物（避免生成在蛇身上）
        function spawnFood() {
            let valid = false;
            while (!valid) {
                food.x = Math.floor(Math.random() * tileCount);
                food.y = Math.floor(Math.random() * tileCount);
                valid = !snake.some(part => part.x === food.x && part.y === food.y);
            }
        }

        // 绘制游戏
        function draw() {
            // 背景
            ctx.fillStyle = '#f8f9fa';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制网格（优化视觉）
            ctx.strokeStyle = '#e9ecef';
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // 绘制蛇（渐变色，区分头部）
            snake.forEach((part, index) => {
                ctx.fillStyle = index === 0 ? '#28a745' : '#4CAF50';
                ctx.fillRect(part.x * gridSize + 1, part.y * gridSize + 1, gridSize - 2, gridSize - 2);
            });

            // 绘制食物（带阴影效果）
            ctx.fillStyle = '#dc3545';
            ctx.shadowColor = 'rgba(220, 53, 69, 0.5)';
            ctx.shadowBlur = 10;
            ctx.fillRect(food.x * gridSize + 2, food.y * gridSize + 2, gridSize - 4, gridSize - 4);
            ctx.shadowBlur = 0;
        }

        // 游戏主循环
        function update() {
            if (isPaused) return;

            // 蛇头新位置
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};

            // 撞墙检测
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver("撞墙了！");
                return;
            }

            // 撞自己检测
            if (snake.some(part => part.x === head.x && part.y === head.y)) {
                gameOver("撞到自己了！");
                return;
            }

            // 更新蛇身
            snake.unshift(head);

            // 吃食物逻辑
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = score;
                spawnFood();
                // 每吃一个食物稍微加速
                if (gameSpeed > 80) {
                    gameSpeed -= 2;
                    updateSpeedLabel();
                    restartGameLoop();
                }
            } else {
                snake.pop();
            }

            draw();
        }

        // 游戏结束处理
        function gameOver(reason) {
            clearInterval(gameLoop);
            isRunning = false;
            // 更新最高分
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                highScoreEl.textContent = highScore;
            }
            aiLogEl.textContent = `游戏结束：${reason} | 最终得分：${score}`;
            alert(`游戏结束！\n得分：${score}\n最高分：${highScore}`);
        }

        // 开始游戏
        function startGame() {
            if (isRunning && !isPaused) return;
            
            if (!isRunning) {
                // 重置游戏状态
                snake = [{x: 10, y: 10}];
                dx = 1; dy = 0;
                score = 0;
                scoreEl.textContent = score;
                gameSpeed = 150;
                updateSpeedLabel();
                spawnFood();
                isRunning = true;
                isPaused = false;
            } else {
                isPaused = false;
            }
            
            restartGameLoop();
            aiLogEl.textContent = "游戏已启动，等待指令中...";
        }

        // 暂停/继续
        function togglePause() {
            if (!isRunning) return;
            isPaused = !isPaused;
            aiLogEl.textContent = isPaused ? "游戏已暂停" : "游戏继续";
        }

        // 重置游戏
        function resetGame() {
            clearInterval(gameLoop);
            isRunning = false;
            isPaused = false;
            snake = [{x: 10, y: 10}];
            dx = 1; dy = 0;
            score = 0;
            scoreEl.textContent = score;
            gameSpeed = 150;
            updateSpeedLabel();
            spawnFood();
            draw();
            aiLogEl.textContent = "游戏已重置，点击开始游戏";
        }

        // 重启游戏循环（用于修改速度后）
        function restartGameLoop() {
            clearInterval(gameLoop);
            gameLoop = setInterval(update, gameSpeed);
        }

        // 更新速度标签
        function updateSpeedLabel() {
            if (gameSpeed > 130) speedEl.textContent = "慢";
            else if (gameSpeed > 100) speedEl.textContent = "中等";
            else speedEl.textContent = "快";
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (!isRunning || isPaused) return;
            
            if (e.key === 'ArrowLeft' && dx !== 1) { dx = -1; dy = 0; }
            else if (e.key === 'ArrowRight' && dx !== -1) { dx = 1; dy = 0; }
            else if (e.key === 'ArrowUp' && dy !== 1) { dy = -1; dx = 0; }
            else if (e.key === 'ArrowDown' && dy !== -1) { dy = 1; dx = 0; }
        });

        // 🤖 AI指令解析器（核心加分功能）
        function processAICommand() {
            const input = document.getElementById('aiInput').value.trim().toLowerCase();
            if (!input) return;

            let response = "";
            let action = false;

            // 简单的指令解析（模拟AI交互逻辑）
            if (input.includes('快') || input.includes('加速') || input.includes('难度')) {
                if (gameSpeed > 80) {
                    gameSpeed -= 30;
                    updateSpeedLabel();
                    restartGameLoop();
                    response = `AI指令执行：游戏加速！当前速度：${speedEl.textContent}`;
                    action = true;
                } else {
                    response = "AI指令执行：速度已达上限，无法继续加速";
                }
            } else if (input.includes('慢') || input.includes('减速')) {
                if (gameSpeed < 250) {
                    gameSpeed += 30;
                    updateSpeedLabel();
                    restartGameLoop();
                    response = `AI指令执行：游戏减速！当前速度：${speedEl.textContent}`;
                    action = true;
                } else {
                    response = "AI指令执行：速度已达下限，无法继续减速";
                }
            } else if (input.includes('重置') || input.includes('重新开始')) {
                resetGame();
                response = "AI指令执行：游戏已重置";
                action = true;
            } else if (input.includes('暂停') || input.includes('继续')) {
                togglePause();
                response = `AI指令执行：游戏已${isPaused ? '暂停' : '继续'}`;
                action = true;
            } else {
                response = `AI解析指令："${input}" | 暂不支持该指令，可尝试：加快速度/减速/重置游戏`;
            }

            // 更新日志
            aiLogEl.textContent = response;
            document.getElementById('aiInput').value = "";

            // 控制台输出（可以截图当终端日志用）
            console.log(`[AI Command] 输入：${input} | 响应：${response}`);
        }

        // 初始绘制
        spawnFood();
        draw();
    </script>
</body>
</html>
